<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Редактор интерактивного диктанта</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 550px; margin:20px auto; background:#f9fbff;}
    .input {margin-top:12px;}
    textarea,input,select {width:100%; padding:7px; border:1px solid #adc5ea; border-radius:6px;}
    .task {border-radius:9px;background:#eef3fc; margin:6px 0 2px 0; padding:7px;}
    .actions{margin-top:7px;}
    button {background:#4978db;color:#fff; border:none; border-radius:7px; padding:6px 16px; margin:0 7px 0 0;}
    .mini {font-size:14px;color:#8ca9d1;}
    #output {margin:20px 0; font-family:monospace;}
    #tasks {margin:17px 0;}
  </style>
</head>
<body>
  <h2>Редактор заданий для диктанта</h2>
  <div class="input"><b>Дефиниция</b> <textarea id="def"></textarea></div>
  <div class="input"><b>Ответ</b> <input id="ans" type="text"></div>
  <div class="input"><b>Фото (опционально, url)</b> <input id="img" type="text"></div>
  <div class="input"><b>Тип задания</b>
    <select id="type">
      <option value="input">Вводить текст</option>
      <option value="order">Расставить буквы</option>
    </select>
  </div>
  <div class="actions">
    <button onclick="addTask()">Добавить задание</button>
  </div>
  <div id="tasks"></div>
  <div class="mini">Добавь все задания, а затем получи ссылку и код для вставки на другой слайд.</div>
  <button onclick="generateGame()" style="margin-top:10px;">Сгенерировать iframe</button>
  <div id="output"></div>
  <script>
    let tasks = [];
    function renderTasks() {
      tasks.length ?
        document.getElementById('tasks').innerHTML =
         tasks.map((t,i)=>`<div class="task">${i+1}. ${t.def} <span class="mini">[${t.ans}]</span>
         <button onclick="delTask(${i})">✗</button></div>`).join('')
      : document.getElementById('tasks').innerHTML = '<div class="mini">Заданий пока нет</div>';
    }
    function addTask() {
      const def = document.getElementById('def').value.trim();
      const ans = document.getElementById('ans').value.trim();
      const img = document.getElementById('img').value.trim();
      const type = document.getElementById('type').value;
      if(!def || !ans) return alert('Заполни все обязательные поля!');
      tasks.push({def, ans, img, type});
      document.getElementById('def').value = '';
      document.getElementById('ans').value = '';
      document.getElementById('img').value = '';
      renderTasks();
    }
    function delTask(i) { tasks.splice(i,1);renderTasks(); }

    function encodeData(tasks){
      // Преобразуем в компактную строку
      return btoa(unescape(encodeURIComponent(JSON.stringify(tasks))));
    }
    function generateGame() {
      if (!tasks.length) return alert('Добавь задания!');
      // исправь ссылку ниже на свою при публикации!
      let base = "https://твойдомен/game.html";
      let data = encodeData(tasks);
      let url = `${base}?data=${data}`;
      let iframe = `<iframe src="${url}" width="460" height="350" style="border:0;border-radius:10px;overflow:hidden;"></iframe>`;
      document.getElementById('output').innerHTML =
        `<b>Ссылка для Genially:</b> <input style="width:96%;" value="${url}" onclick="this.select()"><br><br>
        <b>Iframe-код:</b> <input style="width:95%;" value='${iframe}' onclick="this.select()'><br><br>
        <span class="mini">Скопируй код, вставь на нужный слайд Genially как "встраиваемый элемент".</span>`;
    }
    renderTasks();
  </script>
</body>
</html>
