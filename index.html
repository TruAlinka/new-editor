<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Настройка интерактивного задания</title>
  <style>
    body { font-family: Arial; display:flex; flex-direction:column; align-items:center; background:#f5f7fa; }
    #wrapper { background:#fff; border-radius:12px; margin:40px 0 0 0; box-shadow:0 6px 32px #aac5fa44; padding:25px; width:500px; }
    #editor label { font-weight:600; display:block; margin-top:15px; }
    #editor input, #editor textarea { width:100%; padding:7px; border:1px solid #c9d4ed; border-radius:7px; }
    #previewbox { background: #eff4fc; padding:14px 10px; margin:new 20px 0 0 0; border-radius:7px;}
    iframe { width:100%; height:230px; border:2px solid #8caae6; border-radius:8px; background:#fff;}
    #iframecode { width:100%; background:#f0f3fc; color:#3a2d7d; border:none; padding:6px; font-family:monospace; }
  </style>
</head>
<body>
<div id="wrapper">
  <h2>Редактор интерактивного диктанта</h2>
  <form id="editor" oninput="updatePreview()">
    <label>Дефиниция:<br>
      <textarea id="definition" rows="2" required placeholder="Напишите определение..."></textarea>
    </label>
    <label>Ответ (слово):<br>
      <input type="text" id="answer" required placeholder="Ответ">
    </label>
    <label>Фото (опционально):<br>
      <input type="text" id="imgurl" placeholder="URL-картинки, можно пусто">
    </label>
    <label>Внешний вид (фон):<br>
      <input type="color" id="bgcolor" value="#f7faff">
    </label>
  </form>
  <div id="previewbox">
    <b>Превью задания:</b>
    <iframe id="gameframe"></iframe>
  </div>
  <label style="margin-top:16px;">Код для вставки в Genially (iframe):
    <input id="iframecode" readonly>
  </label>
</div>

<script>
function escapeHTML(s) {
  return s.replace(/[<>"']/g, ch => ({
    '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
  })[ch]);
}

function genGameHTML(def, ans, img, bgcolor) {
  return `
  <html><body style="margin:0;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;background:${bgcolor};">
    ${img ? `<img src="${escapeHTML(img)}" style="max-width:95px;max-height:85px;border-radius:7px;box-shadow:0 3px 9px #0001">` : ''}
    <div style="margin:10px 0; font-size:20px; color:#26377e">${escapeHTML(def)}</div>
    <div id="letters"></div>
    <input id="userin" type="text" autocomplete="off" minlength="1" maxlength="18" style="font-size:18px;padding:4px;width:110px;border-radius:7px; border:1px solid #b3daf6;">
    <button onclick="check()"
      style="font-size:15px;padding:4px 8px;margin-left:6px;background:#4ed8b1;color:#26377e;border:none;border-radius:5px;">Проверить</button>
    <div id="feedback" style="font-size:17px; margin:12px 0 0 0;"></div>
    <script>
      const ans = "${escapeHTML(ans)}".trim();
      function check() {
        var userin = document.getElementById('userin').value.trim();
        if (userin.toLowerCase() === ans.toLowerCase()) {
          document.getElementById('feedback').innerHTML = "✅ Молодец!";
        } else {
          document.getElementById('feedback').innerHTML = "";
        }
      }
    <\/script>
  </body></html>
  `;
}

function updatePreview() {
  const def = document.getElementById('definition').value,
      ans = document.getElementById('answer').value,
      img = document.getElementById('imgurl').value,
      bgcolor = document.getElementById('bgcolor').value;

  const gameHTML = genGameHTML(def, ans, img, bgcolor);
  const blob = new Blob([gameHTML], {type: 'text/html'});
  const url = URL.createObjectURL(blob);

  document.getElementById('gameframe').src = url;
  document.getElementById('iframecode').value = `<iframe src="${url}" width="400" height="200" frameborder="0"></iframe>`;
}

updatePreview();
</script>
</body>
</html>
